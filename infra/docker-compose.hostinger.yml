version: "3.8"

# ═══════════════════════════════════════════════════════
# Flash Motion — Hostinger VPS Deployment
#
# Quick deploy:
#   docker compose -f infra/docker-compose.hostinger.yml up -d
#
# If GHCR images aren't available, build locally:
#   docker compose -f infra/docker-compose.hostinger.yml up -d --build
#
# Test backend without Traefik:
#   curl http://localhost:4000/api/health
# ═══════════════════════════════════════════════════════

services:
  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-flashmotion}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-flashmotion}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-flashmotion}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──
  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis-data:/data
    networks:
      - default
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible storage) ──
  minio:
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - minio-data:/data
    networks:
      - default
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ──
  backend:
    # Use GHCR image if available, otherwise build locally with --build
    image: ghcr.io/gavoekoffi2/flash-motion-backend:latest
    build:
      context: ../backend
      dockerfile: ../infra/Dockerfile.backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - default
      - web
    # Expose port directly for debugging (accessible only from VPS localhost)
    ports:
      - "127.0.0.1:4000:4000"
    labels:
      - "traefik.enable=true"
      # HTTPS router
      - "traefik.http.routers.flashmotion-api.rule=Host(`${API_DOMAIN:-api.finablasolution.cloud}`)"
      - "traefik.http.routers.flashmotion-api.entrypoints=websecure"
      - "traefik.http.routers.flashmotion-api.tls=true"
      - "traefik.http.routers.flashmotion-api.tls.certresolver=letsencrypt"
      # HTTP router (redirect to HTTPS)
      - "traefik.http.routers.flashmotion-api-http.rule=Host(`${API_DOMAIN:-api.finablasolution.cloud}`)"
      - "traefik.http.routers.flashmotion-api-http.entrypoints=web"
      - "traefik.http.routers.flashmotion-api-http.middlewares=flashmotion-https-redirect"
      - "traefik.http.middlewares.flashmotion-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.flashmotion-https-redirect.redirectscheme.permanent=true"
      # Service — tell Traefik which port the backend listens on
      - "traefik.http.services.flashmotion-api.loadbalancer.server.port=4000"
      - "traefik.docker.network=web"
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${DB_USER:-flashmotion}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-flashmotion}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: flash-motion
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-https://finablasolution.cloud,https://flashmotion.netlify.app}
      LLM_MODE: ${LLM_MODE:-auto}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-mistralai/mistral-7b-instruct}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Remotion Render Worker ──
  worker:
    image: ghcr.io/gavoekoffi2/flash-motion-worker:latest
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - default
    environment:
      DATABASE_URL: postgresql://${DB_USER:-flashmotion}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-flashmotion}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: flash-motion
      S3_REGION: ${S3_REGION:-us-east-1}
      MAX_CONCURRENT_RENDERS: "1"
      RENDER_TIMEOUT_MS: "300000"
      TEMP_DIR: /tmp/flash-motion
    volumes:
      - worker-temp:/tmp/flash-motion
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2"

networks:
  default:
    name: flashmotion_default
  web:
    external: true

volumes:
  postgres-data:
  redis-data:
  minio-data:
  worker-temp:
