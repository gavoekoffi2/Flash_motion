version: "3.8"

# ═══════════════════════════════════════════════════════
# Flash Motion — Production Stack
# Frontend: Netlify (separate)
# Backend:  This compose (API + DB + Redis + S3 + Worker)
# HTTPS:    Caddy with automatic Let's Encrypt
# ═══════════════════════════════════════════════════════

services:
  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-flashmotion}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
      POSTGRES_DB: ${DB_NAME:-flashmotion}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-flashmotion}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible storage) ──
  minio:
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-change-me}
    volumes:
      - minio-data:/data
    ports:
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ──
  backend:
    build:
      context: ../backend
      dockerfile: ../infra/Dockerfile.backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${DB_USER:-flashmotion}:${DB_PASSWORD:-change-me}@postgres:5432/${DB_NAME:-flashmotion}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-change-me}
      S3_BUCKET: flash-motion
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-https://flashmotion.netlify.app}
      LLM_MODE: ${LLM_MODE:-auto}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-mistralai/mistral-7b-instruct}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-mistral}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Caddy — Reverse proxy with automatic HTTPS (Let's Encrypt) ──
  caddy:
    image: caddy:2-alpine
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      API_DOMAIN: ${API_DOMAIN:-api.finablasolution.cloud}

  # ── Remotion Render Worker ──
  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:-flashmotion}:${DB_PASSWORD:-change-me}@postgres:5432/${DB_NAME:-flashmotion}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-change-me}
      S3_BUCKET: flash-motion
      S3_REGION: ${S3_REGION:-us-east-1}
      MAX_CONCURRENT_RENDERS: "1"
      RENDER_TIMEOUT_MS: "300000"
      TEMP_DIR: /tmp/flash-motion
    volumes:
      - worker-temp:/tmp/flash-motion
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2"

volumes:
  postgres-data:
  redis-data:
  minio-data:
  caddy-data:
  caddy-config:
  worker-temp:
