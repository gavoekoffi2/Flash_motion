name: Build & Push Docker Images

on:
  push:
    branches:
      - main
      - claude/flash-motion-saas-mvp-SFpLy

env:
  REGISTRY: ghcr.io

jobs:
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./infra/Dockerfile.backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/flash-motion-backend:latest
            ghcr.io/${{ github.repository_owner }}/flash-motion-backend:${{ github.sha }}

  build-worker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./infra/Dockerfile.worker
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/flash-motion-worker:latest
            ghcr.io/${{ github.repository_owner }}/flash-motion-worker:${{ github.sha }}
